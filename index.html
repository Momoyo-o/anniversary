<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>記念日カウンター</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@300;400;500;700&family=Kaisei+Decol:wght@400;700&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Design Tokens ─── */
    :root {
      --gold:      #e8c97a;
      --gold-light:#f5e4a8;
      --rose:      #e8748a;
      --rose-light:#f5aab8;
      --cream:     #fff9f0;
      --ink:       #2a1a2e;
      --ink-soft:  rgba(42,26,46,0.65);
      --white80:   rgba(255,255,255,0.80);
      --white40:   rgba(255,255,255,0.40);
      --white15:   rgba(255,255,255,0.15);
      --shadow-lg: 0 24px 64px rgba(0,0,0,0.35);
      --shadow-sm: 0 4px 18px rgba(0,0,0,0.18);
      --radius:    24px;
      --easing:    cubic-bezier(.22,.68,0,1.2);
    }

    /* ─── Reset ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }

    /* ─── Base ─── */
    body {
      font-family: 'Zen Maru Gothic', sans-serif;
      background: #ff85a1;
      color: #fff;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ─── Canvas confetti ─── */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── App wrapper ─── */
    #app {
      position: relative;
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 1;
    }

    /* ─── Background layer ─── */
    #bg-layer {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(160deg, #ffb7c5 0%, #ff85a1 35%, #e8608a 70%, #c94070 100%);
      transition: opacity 0.8s ease;
      z-index: 0;
    }
    #bg-layer.has-image {
      background-size: cover;
      background-position: center;
    }
    #bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(180,40,80,0.18) 0%,
        rgba(160,30,70,0.10) 40%,
        rgba(140,20,60,0.38) 100%
      );
      z-index: 1;
    }

    /* ─── Slide container ─── */
    #slides-wrapper {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      z-index: 2;
      overflow: hidden;
    }

    /* ─── Single slide ─── */
    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 5rem;
      opacity: 0;
      transform: scale(0.94) translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s var(--easing);
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }
    .slide.exit-left {
      opacity: 0;
      transform: scale(0.92) translateX(-40px);
    }
    .slide.exit-right {
      opacity: 0;
      transform: scale(0.92) translateX(40px);
    }

    /* ─── Decorative ring ─── */
    .deco-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(90vw, 420px);
      aspect-ratio: 1;
      border-radius: 50%;
      border: 1px solid rgba(232,201,122,0.18);
      pointer-events: none;
      animation: pulse-ring 4s ease-in-out infinite;
    }
    .deco-ring::after {
      content: '';
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      border: 1px solid rgba(232,201,122,0.10);
    }
    @keyframes pulse-ring {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
      50%      { transform: translate(-50%,-50%) scale(1.04); opacity:0.6; }
    }

    /* ─── Title ─── */
    .anniversary-title {
      font-family: 'Kaisei Decol', serif;
      font-size: clamp(1.6rem, 7vw, 2.6rem);
      color: var(--gold-light);
      text-shadow: 0 2px 24px rgba(232,201,122,0.5);
      letter-spacing: 0.04em;
      margin-bottom: 0.4rem;
      text-align: center;
      animation: fade-up 0.7s var(--easing) both;
    }
    .anniversary-date {
      font-size: 0.78rem;
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 2.4rem;
      animation: fade-up 0.7s 0.1s var(--easing) both;
    }

    /* ─── Count display ─── */
    .count-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fade-up 0.7s 0.2s var(--easing) both;
      margin-bottom: 1.8rem;
    }
    .count-number {
      font-family: 'Kaisei Decol', serif;
      font-size: clamp(5rem, 28vw, 9rem);
      font-weight: 700;
      line-height: 0.9;
      color: #fff;
      text-shadow:
        0 0 40px rgba(232,201,122,0.55),
        0 4px 32px rgba(0,0,0,0.6);
      letter-spacing: -0.02em;
      transition: transform 0.3s var(--easing);
    }
    .count-label {
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--gold);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* ─── Sub info ─── */
    .sub-info {
      display: flex;
      gap: 1.6rem;
      animation: fade-up 0.7s 0.35s var(--easing) both;
    }
    .sub-chip {
      background: var(--white15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 0.45rem 1.1rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.75);
    }
    .sub-chip span {
      color: var(--gold-light);
      font-weight: 600;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Navigation dots ─── */
    #nav-dots {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .nav-dot.active {
      width: 22px;
      border-radius: 4px;
      background: var(--gold);
    }

    /* ─── Bottom bar ─── */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: rgba(15,8,22,0.78);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 0 1rem;
      z-index: 20;
    }
    .bar-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: 'Zen Maru Gothic', sans-serif;
      letter-spacing: 0.1em;
      cursor: pointer;
      padding: 0.5rem 1rem;
      border-radius: 14px;
      transition: color 0.2s, background 0.2s;
    }
    .bar-btn svg { width: 22px; height: 22px; transition: transform 0.3s var(--easing); }
    .bar-btn:active svg { transform: scale(0.88); }
    .bar-btn.primary {
      background: linear-gradient(135deg, var(--rose) 0%, #c44a6a 100%);
      color: #fff;
      padding: 0.5rem 1.5rem;
      box-shadow: 0 4px 20px rgba(232,116,138,0.45);
    }
    .bar-btn.primary:active { transform: scale(0.95); }

    /* ─── Sheet (modal) ─── */
    .sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 40;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1e1128;
      border-radius: 28px 28px 0 0;
      padding: 0 1.4rem 2rem;
      z-index: 50;
      transform: translateY(100%);
      transition: transform 0.4s var(--easing);
      max-height: 92dvh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 38px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
      margin: 14px auto 18px;
    }
    .sheet-title {
      font-family: 'Kaisei Decol', serif;
      font-size: 1.3rem;
      color: var(--gold-light);
      margin-bottom: 1.4rem;
      text-align: center;
    }

    /* ─── Form ─── */
    .form-group { margin-bottom: 1.2rem; }
    .form-label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .form-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      color: #fff;
      font-family: 'Zen Maru Gothic', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      -webkit-appearance: none;
    }
    .form-input:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.10);
    }
    .form-input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.4);
    }

    /* ─── Image picker ─── */
    .img-picker-btn {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1.5px dashed rgba(232,201,122,0.35);
      border-radius: 14px;
      color: var(--gold);
      font-family: 'Zen Maru Gothic', sans-serif;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .img-picker-btn:active { background: rgba(255,255,255,0.10); }
    #img-preview {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 14px;
      margin-top: 0.7rem;
      display: none;
    }
    #img-preview.visible { display: block; }

    /* ─── Action buttons ─── */
    .btn-row {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.6rem;
    }
    .btn {
      flex: 1;
      border: none;
      border-radius: 50px;
      font-family: 'Zen Maru Gothic', sans-serif;
      padding: 0.9rem 1rem;
      cursor: pointer;
      transition: transform 0.2s var(--easing), box-shadow 0.2s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary {
      background: linear-gradient(135deg, var(--rose) 0%, #c44a6a 100%);
      color: #fff;
      box-shadow: 0 6px 20px rgba(232,116,138,0.4);
    }
    .btn-ghost {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.65);
    }
    .btn-danger {
      background: rgba(255,80,80,0.15);
      color: #ff7070;
    }

    /* ─── List sheet ─── */
    .ann-list { display: flex; flex-direction: column; gap: 0.8rem; margin-top: 0.5rem; }
    .ann-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      padding: 0.9rem 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .ann-item:active { background: rgba(255,255,255,0.10); }
    .ann-item.selected { border-color: var(--gold); background: rgba(232,201,122,0.08); }
    .ann-item-info { flex: 1; min-width: 0; }
    .ann-item-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ann-item-days {
      font-size: 0.72rem;
      color: var(--gold);
      margin-top: 2px;
    }
    .ann-item-thumb {
      width: 44px; height: 44px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      background: rgba(255,255,255,0.08);
    }
    .ann-item-thumb.no-img {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: rgba(255,255,255,0.35);
      font-size: 0.88rem;
      line-height: 1.8;
    }
    .empty-state .big-icon { font-size: 3rem; margin-bottom: 0.8rem; }

    /* ─── Swipe hint ─── */
    .swipe-hint {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.15em;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10;
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(30,17,40,0.92);
      border: 1px solid rgba(232,201,122,0.3);
      border-radius: 50px;
      padding: 0.55rem 1.4rem;
      font-size: 0.8rem;
      color: var(--gold-light);
      letter-spacing: 0.06em;
      z-index: 100;
      transition: transform 0.4s var(--easing);
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── Shimmer on number ─── */
    @keyframes shimmer {
      0%   { text-shadow: 0 0 40px rgba(232,201,122,0.55), 0 4px 32px rgba(0,0,0,0.6); }
      50%  { text-shadow: 0 0 80px rgba(232,201,122,0.9), 0 4px 32px rgba(0,0,0,0.6); }
      100% { text-shadow: 0 0 40px rgba(232,201,122,0.55), 0 4px 32px rgba(0,0,0,0.6); }
    }
    .count-number.shimmer { animation: shimmer 1.5s ease-in-out; }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div id="app">
  <div id="bg-layer"></div>
  <div id="bg-overlay"></div>

  <div id="slides-wrapper">
    <!-- slides injected by JS -->
  </div>
</div>

<!-- Nav dots -->
<div id="nav-dots"></div>
<div class="swipe-hint" id="swipe-hint">← スワイプで切り替え →</div>

<!-- Bottom bar -->
<div id="bottom-bar">
  <button class="bar-btn" id="btn-list" aria-label="一覧">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
      <circle cx="3.5" cy="6" r="1.2" fill="currentColor"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor"/>
    </svg>
    一覧
  </button>
  <button class="bar-btn primary" id="btn-add" aria-label="追加">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    追加
  </button>
  <button class="bar-btn" id="btn-edit" aria-label="編集">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
      <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
    </svg>
    編集
  </button>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Sheet backdrop -->
<div class="sheet-backdrop" id="sheet-backdrop"></div>

<!-- Add / Edit Sheet -->
<div class="sheet" id="form-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="form-sheet-title">新しい記念日</div>

  <div class="form-group">
    <label class="form-label" for="input-title">タイトル</label>
    <input class="form-input" id="input-title" type="text" placeholder="例: 付き合った記念日" maxlength="30" />
  </div>
  <div class="form-group">
    <label class="form-label" for="input-date">開始日</label>
    <input class="form-input" id="input-date" type="date" />
  </div>
  <div class="form-group">
    <label class="form-label">背景画像</label>
    <button class="img-picker-btn" id="img-picker-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      画像を選択
    </button>
    <input type="file" id="file-input" accept="image/*" style="display:none" />
    <img id="img-preview" alt="プレビュー" />
  </div>

  <div class="btn-row">
    <button class="btn btn-ghost" id="btn-form-cancel">キャンセル</button>
    <button class="btn btn-primary" id="btn-form-save">保存する</button>
  </div>
  <div class="btn-row" id="delete-row" style="display:none">
    <button class="btn btn-danger" id="btn-form-delete">この記念日を削除</button>
  </div>
</div>

<!-- List Sheet -->
<div class="sheet" id="list-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">記念日一覧</div>
  <div class="ann-list" id="ann-list"></div>
  <div class="btn-row" style="margin-top:1.2rem">
    <button class="btn btn-ghost" id="btn-list-close">閉じる</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   DATA LAYER
═══════════════════════════════════════════ */
const STORAGE_KEY = 'anniversary_v2';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function daysSince(dateStr) {
  const start = new Date(dateStr);
  start.setHours(0,0,0,0);
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.floor((now - start) / 86400000) + 1;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function yearMonthDay(dateStr) {
  const start = new Date(dateStr);
  start.setHours(0,0,0,0);
  const now = new Date();
  now.setHours(0,0,0,0);
  let y = now.getFullYear() - start.getFullYear();
  let m = now.getMonth()  - start.getMonth();
  let d = now.getDate()   - start.getDate();
  if (d < 0) { m--; const prev = new Date(now.getFullYear(), now.getMonth(), 0); d += prev.getDate(); }
  if (m < 0) { y--; m += 12; }
  return { y, m, d };
}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let items = load();
let currentIdx = 0;
let editingId = null;
let pendingImageData = null;

/* ═══════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════ */
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let confettiRunning = true;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const COLORS = ['#e8c97a','#f5e4a8','#e8748a','#c44a6a','#a78bfa','#ffffff','#7dd3fc'];

function spawnParticle() {
  return {
    x: Math.random() * canvas.width,
    y: -12,
    w: Math.random() * 8 + 4,
    h: Math.random() * 4 + 2,
    r: Math.random() * Math.PI * 2,
    dr: (Math.random() - 0.5) * 0.08,
    vy: Math.random() * 1.2 + 0.6,
    vx: (Math.random() - 0.5) * 0.8,
    opacity: Math.random() * 0.5 + 0.25,
    color: COLORS[Math.floor(Math.random() * COLORS.length)],
  };
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (confettiRunning) {
    while (particles.length < 55) particles.push(spawnParticle());
  }
  particles.forEach((p, i) => {
    p.y += p.vy;
    p.x += p.vx;
    p.r += p.dr;
    ctx.save();
    ctx.globalAlpha = p.opacity;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.r);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.w/2, p.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
    if (p.y > canvas.height + 20) particles[i] = spawnParticle();
  });
  requestAnimationFrame(animateConfetti);
}
animateConfetti();

/* ═══════════════════════════════════════════
   RENDER SLIDES
═══════════════════════════════════════════ */
const slidesWrapper = document.getElementById('slides-wrapper');
const navDotsEl    = document.getElementById('nav-dots');
const bgLayer      = document.getElementById('bg-layer');
const swipeHint    = document.getElementById('swipe-hint');

function renderSlides() {
  slidesWrapper.innerHTML = '';
  navDotsEl.innerHTML     = '';

  if (items.length === 0) {
    slidesWrapper.innerHTML = `
      <div class="slide active">
        <div class="empty-state">
          <div class="big-icon">💝</div>
          大切な記念日を登録しましょう。<br>下の「＋追加」ボタンからはじめられます。
        </div>
      </div>`;
    swipeHint.style.display = 'none';
    return;
  }

  swipeHint.style.display = items.length > 1 ? 'block' : 'none';

  items.forEach((item, i) => {
    const days = daysSince(item.date);
    const ymd  = yearMonthDay(item.date);

    const slide = document.createElement('div');
    slide.className = 'slide' + (i === currentIdx ? ' active' : '');
    slide.dataset.idx = i;

    slide.innerHTML = `
      <div class="deco-ring"></div>
      <div class="anniversary-title">${escHtml(item.title)}</div>
      <div class="anniversary-date">${formatDate(item.date)}</div>
      <div class="count-wrap">
        <div class="count-number" id="count-num-${i}">0</div>
        <div class="count-label">Days</div>
      </div>
      <div class="sub-info">
        <div class="sub-chip"><span>${ymd.y}</span> 年</div>
        <div class="sub-chip"><span>${ymd.m}</span> ヶ月</div>
        <div class="sub-chip"><span>${ymd.d}</span> 日</div>
      </div>`;
    slidesWrapper.appendChild(slide);

    // Nav dot
    const dot = document.createElement('div');
    dot.className = 'nav-dot' + (i === currentIdx ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    navDotsEl.appendChild(dot);
  });

  updateBackground();
  // CountUp animation for active slide
  countUpAnimate(currentIdx);
}

function countUpAnimate(idx) {
  const el = document.getElementById(`count-num-${idx}`);
  if (!el) return;
  const target = daysSince(items[idx].date);
  const duration = 900;
  const start = performance.now();
  function frame(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(ease * target).toLocaleString();
    if (t < 1) requestAnimationFrame(frame);
    else {
      el.textContent = target.toLocaleString();
      el.classList.add('shimmer');
      setTimeout(() => el.classList.remove('shimmer'), 1600);
    }
  }
  requestAnimationFrame(frame);
}

function updateBackground() {
  const overlay = document.getElementById('bg-overlay');
  if (items.length === 0) {
    bgLayer.style.backgroundImage = '';
    bgLayer.classList.remove('has-image');
    overlay.style.background = 'linear-gradient(180deg,rgba(180,40,80,0.18) 0%,rgba(160,30,70,0.10) 40%,rgba(140,20,60,0.38) 100%)';
    return;
  }
  const item = items[currentIdx];
  if (item.backgroundImage) {
    bgLayer.style.backgroundImage = `url(${item.backgroundImage})`;
    bgLayer.classList.add('has-image');
    overlay.style.background = 'linear-gradient(180deg,rgba(15,5,25,0.55) 0%,rgba(20,8,30,0.30) 40%,rgba(10,3,18,0.75) 100%)';
  } else {
    bgLayer.style.backgroundImage = '';
    bgLayer.classList.remove('has-image');
    overlay.style.background = 'linear-gradient(180deg,rgba(180,40,80,0.18) 0%,rgba(160,30,70,0.10) 40%,rgba(140,20,60,0.38) 100%)';
  }
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function goTo(newIdx, dir = 0) {
  if (newIdx < 0 || newIdx >= items.length || newIdx === currentIdx) return;
  const slides = slidesWrapper.querySelectorAll('.slide');
  const dots   = navDotsEl.querySelectorAll('.nav-dot');

  // Exit current
  slides[currentIdx].classList.remove('active');
  slides[currentIdx].classList.add(dir >= 0 ? 'exit-left' : 'exit-right');

  currentIdx = newIdx;
  slides[currentIdx].classList.add('active');

  // Cleanup
  setTimeout(() => {
    slides.forEach(s => { s.classList.remove('exit-left','exit-right'); });
  }, 520);

  dots.forEach((d,i) => d.classList.toggle('active', i === currentIdx));
  updateBackground();
  countUpAnimate(currentIdx);
}

/* ═══════════════════════════════════════════
   SWIPE
═══════════════════════════════════════════ */
let touchStartX = 0;
slidesWrapper.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
slidesWrapper.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) {
    if (dx < 0) goTo(currentIdx + 1, 1);
    else        goTo(currentIdx - 1, -1);
  }
}, {passive:true});

/* ═══════════════════════════════════════════
   SHEET HELPERS
═══════════════════════════════════════════ */
const backdrop     = document.getElementById('sheet-backdrop');
const formSheet    = document.getElementById('form-sheet');
const listSheet    = document.getElementById('list-sheet');

function openSheet(sheet) {
  backdrop.classList.add('open');
  sheet.classList.add('open');
}
function closeAllSheets() {
  backdrop.classList.remove('open');
  formSheet.classList.remove('open');
  listSheet.classList.remove('open');
}
backdrop.addEventListener('click', closeAllSheets);

/* ═══════════════════════════════════════════
   FORM SHEET
═══════════════════════════════════════════ */
const formTitle   = document.getElementById('form-sheet-title');
const inputTitle  = document.getElementById('input-title');
const inputDate   = document.getElementById('input-date');
const imgPreview  = document.getElementById('img-preview');
const fileInput   = document.getElementById('file-input');
const deleteRow   = document.getElementById('delete-row');

document.getElementById('img-picker-btn').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImageData = ev.target.result;
    imgPreview.src = pendingImageData;
    imgPreview.classList.add('visible');
  };
  reader.readAsDataURL(file);
});

function openAddForm() {
  editingId = null;
  pendingImageData = null;
  inputTitle.value  = '';
  inputDate.value   = new Date().toISOString().split('T')[0];
  imgPreview.src    = '';
  imgPreview.classList.remove('visible');
  fileInput.value   = '';
  formTitle.textContent = '新しい記念日';
  deleteRow.style.display = 'none';
  openSheet(formSheet);
}

function openEditForm() {
  if (items.length === 0) { showToast('まず記念日を追加してください'); return; }
  const item = items[currentIdx];
  editingId = item.id;
  pendingImageData = null;
  inputTitle.value = item.title;
  inputDate.value  = item.date;
  if (item.backgroundImage) {
    imgPreview.src = item.backgroundImage;
    imgPreview.classList.add('visible');
  } else {
    imgPreview.src = '';
    imgPreview.classList.remove('visible');
  }
  fileInput.value = '';
  formTitle.textContent = '記念日を編集';
  deleteRow.style.display = 'flex';
  openSheet(formSheet);
}

document.getElementById('btn-add').addEventListener('click', openAddForm);
document.getElementById('btn-edit').addEventListener('click', openEditForm);

document.getElementById('btn-form-cancel').addEventListener('click', closeAllSheets);

document.getElementById('btn-form-save').addEventListener('click', () => {
  const title = inputTitle.value.trim();
  const date  = inputDate.value;
  if (!title) { showToast('タイトルを入力してください'); return; }
  if (!date)  { showToast('日付を選択してください'); return; }

  if (editingId) {
    const idx = items.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      items[idx].title = title;
      items[idx].date  = date;
      if (pendingImageData) items[idx].backgroundImage = pendingImageData;
      currentIdx = idx;
    }
  } else {
    const newItem = {
      id: Date.now().toString(),
      title,
      date,
      backgroundImage: pendingImageData || null,
    };
    items.push(newItem);
    currentIdx = items.length - 1;
  }
  save(items);
  closeAllSheets();
  renderSlides();
  showToast(editingId ? '更新しました ✨' : '登録しました 🎉');
  if (!editingId) burstConfetti();
});

document.getElementById('btn-form-delete').addEventListener('click', () => {
  if (!confirm('この記念日を削除しますか？')) return;
  items = items.filter(x => x.id !== editingId);
  currentIdx = Math.min(currentIdx, Math.max(items.length - 1, 0));
  save(items);
  closeAllSheets();
  renderSlides();
  showToast('削除しました');
});

/* ═══════════════════════════════════════════
   LIST SHEET
═══════════════════════════════════════════ */
document.getElementById('btn-list').addEventListener('click', () => {
  const listEl = document.getElementById('ann-list');
  listEl.innerHTML = '';
  if (items.length === 0) {
    listEl.innerHTML = '<div class="empty-state"><div class="big-icon">📅</div>まだ登録されていません</div>';
  } else {
    items.forEach((item, i) => {
      const days = daysSince(item.date);
      const div = document.createElement('div');
      div.className = 'ann-item' + (i === currentIdx ? ' selected' : '');
      const thumbHtml = item.backgroundImage
        ? `<img class="ann-item-thumb" src="${item.backgroundImage}" alt="" />`
        : `<div class="ann-item-thumb no-img">💝</div>`;
      div.innerHTML = `
        <div class="ann-item-info">
          <div class="ann-item-name">${escHtml(item.title)}</div>
          <div class="ann-item-days">${days.toLocaleString()} 日</div>
        </div>
        ${thumbHtml}`;
      div.addEventListener('click', () => {
        const prev = currentIdx;
        currentIdx = i;
        if (prev !== i) { goTo(i, i > prev ? 1 : -1); currentIdx = i; }
        closeAllSheets();
      });
      listEl.appendChild(div);
    });
  }
  openSheet(listSheet);
});
document.getElementById('btn-list-close').addEventListener('click', closeAllSheets);

/* ═══════════════════════════════════════════
   CONFETTI BURST
═══════════════════════════════════════════ */
function burstConfetti() {
  const burst = [];
  for (let i = 0; i < 80; i++) {
    burst.push({
      x: canvas.width / 2 + (Math.random()-0.5)*80,
      y: canvas.height * 0.45,
      w: Math.random()*10+4,
      h: Math.random()*5+2,
      r: Math.random()*Math.PI*2,
      dr: (Math.random()-0.5)*0.18,
      vy: -(Math.random()*6+3),
      vx: (Math.random()-0.5)*6,
      opacity: 0.9,
      color: COLORS[Math.floor(Math.random()*COLORS.length)],
      gravity: 0.18,
    });
  }
  let frame = 0;
  function animate() {
    burst.forEach(p => {
      p.vy += p.gravity;
      p.y += p.vy;
      p.x += p.vx;
      p.r += p.dr;
      p.opacity -= 0.008;
    });
    burst.filter(p => p.opacity > 0 && p.y < canvas.height);
    frame++;
    if (frame < 160 && burst.some(p => p.opacity > 0)) requestAnimationFrame(animate);
  }
  // Temporarily add burst particles
  const burstCtx = canvas.getContext('2d');
  function drawBurst() {
    burst.forEach(p => {
      if (p.opacity <= 0) return;
      p.vy += p.gravity;
      p.y  += p.vy;
      p.x  += p.vx;
      p.r  += p.dr;
      p.opacity -= 0.008;
      burstCtx.save();
      burstCtx.globalAlpha = p.opacity;
      burstCtx.translate(p.x, p.y);
      burstCtx.rotate(p.r);
      burstCtx.fillStyle = p.color;
      burstCtx.beginPath();
      burstCtx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);
      burstCtx.fill();
      burstCtx.restore();
    });
    if (burst.some(p => p.opacity > 0)) requestAnimationFrame(drawBurst);
  }
  drawBurst();
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderSlides();
</script>
